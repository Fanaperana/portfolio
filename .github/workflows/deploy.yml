name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Weekly rebuild — keeps the site fresh and catches environmental drift
  # (toolchain updates, dependency rot, dead links in thumbnails, etc.).
  schedule:
    - cron: "0 6 * * 1" # every Monday, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt into Node.js 24 for all actions (Node 20 deprecates Sept 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Test Rust crate
        run: cargo test -p mini-shell

      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          # Default GITHUB_TOKEN refreshes public-repo stats & READMEs.
          # Private READMEs are fetched locally via `pnpm fetch:github`
          # and committed to src/lib/data/github.generated.ts — the fetch
          # script merges, preserving cached private copies.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - name: Copy 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
